<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/png" href="/logo-color.png" />
    <title>Knowledge Base Divisi PKN | KPKNL Kendari</title>

    <!--
      Font Google — dipertahankan via <link> bukan @import CSS agar
      preconnect bekerja optimal dan tidak memblok render.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!--
      [#9] DIHAPUS: <script src="https://cdn.tailwindcss.com?plugins=typography">
      dan blok tailwind.config = { ... } di bawahnya.

      Alasan penghapusan:
      1. CDN adalah runtime compiler — lambat, ~200 KB extra, tidak di-tree-shake
      2. Jika CDN gagal dimuat (jaringan lambat/blokir), seluruh tampilan rusak
      3. darkMode: "class" kini dikonfigurasi di tailwind.config.cjs
      4. Plugin 'tailwindcss-animate' (animate-in, slide-in, zoom-in, dll)
         tidak tersedia di CDN → kelas-kelas itu sebelumnya tidak menghasilkan
         CSS apapun. Setelah migrasi ini, kelas tersebut baru aktif sungguhan.
      5. Konfigurasi custom (warna kemenkeu, font) dipindah ke tailwind.config.cjs

      Pengganti: Tailwind di-bundle oleh Vite via PostCSS (postcss.config.cjs).
      CSS di-import di index.tsx → src/index.css → @tailwind directives.
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
